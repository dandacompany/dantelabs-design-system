<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AI단테랩스 · Profile Picture v2a (Dark)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:wght@400;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: #1a1a1a;
      }
      .canvas {
        position: absolute;
        inset: 0;
        width: 1024px;
        height: 1024px;
      }
      svg {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Ink gradient (inverted from paper gradient) -->
          <radialGradient id="inkGrad" cx="50%" cy="42%" r="68%">
            <stop offset="0%" stop-color="#222222" />
            <stop offset="55%" stop-color="#1a1a1a" />
            <stop offset="100%" stop-color="#111111" />
          </radialGradient>
        </defs>

        <!-- Ink background circle -->
        <circle cx="512" cy="512" r="512" fill="url(#inkGrad)" />

        <!-- Outer rust seal ring -->
        <circle
          cx="512"
          cy="512"
          r="498"
          fill="none"
          stroke="#A0522D"
          stroke-width="6"
        />
        <!-- Inner sepia ring -->
        <circle
          cx="512"
          cy="512"
          r="478"
          fill="none"
          stroke="#8B6F47"
          stroke-width="1.4"
          opacity="0.75"
        />

        <!-- Decorative diamonds -->
        <g fill="#A0522D">
          <polygon points="64,512 78,498 92,512 78,526" />
          <polygon points="932,512 946,498 960,512 946,526" />
        </g>

        <!-- ─── Portrait (Paper line on Ink — inverted v2a) ────────── -->
        <g
          stroke="#F7F2E6"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        >
          <!-- HAIR outer outline (paper) -->
          <path
            d="
      M 360,360
      Q 348,290 378,245
      Q 415,205 470,200
      Q 520,198 565,210
      Q 615,225 645,265
      Q 670,305 660,360
    "
            stroke-width="11"
          />

          <!-- HAIR mass: PAPER fill (inverted from ink fill) -->
          <path
            d="
      M 360,360
      Q 348,290 378,245
      Q 415,205 470,200
      Q 520,198 565,210
      Q 615,225 645,265
      Q 670,305 660,360
      Q 640,330 595,330
      Q 555,330 530,355
      Q 510,335 480,338
      Q 445,340 420,360
      Q 395,345 365,360
      Z
    "
            fill="#FCF9F0"
            opacity="0.95"
            stroke="none"
          />

          <!-- Hair internal brush-strokes (dark strokes on light hair · inverted) -->
          <path
            d="M 405,260 Q 440,238 480,250"
            stroke="#3a3a3a"
            stroke-width="3.5"
            opacity="0.6"
          />
          <path
            d="M 495,228 Q 530,218 570,232"
            stroke="#3a3a3a"
            stroke-width="3.5"
            opacity="0.55"
          />
          <path
            d="M 580,240 Q 605,230 625,250"
            stroke="#3a3a3a"
            stroke-width="3"
            opacity="0.5"
          />

          <!-- Hair side-part subtle V -->
          <path
            d="M 488,205 L 482,310"
            stroke="#3a3a3a"
            stroke-width="2.5"
            opacity="0.45"
          />

          <!-- FACE outline (paper) -->
          <path
            d="
      M 360,360
      Q 358,460 380,540
      Q 410,615 480,635
      Q 510,640 545,635
      Q 615,615 645,540
      Q 665,460 660,360
    "
            stroke-width="9"
          />

          <!-- Right ear -->
          <path
            d="M 660,420 Q 680,445 673,490 Q 665,515 645,510"
            stroke-width="6"
          />

          <!-- Eyebrows -->
          <path d="M 390,400 Q 422,388 460,402" stroke-width="7" />
          <path d="M 562,402 Q 600,388 630,398" stroke-width="7" />

          <!-- Glasses -->
          <circle cx="427" cy="455" r="50" stroke-width="9" />
          <circle cx="593" cy="455" r="50" stroke-width="9" />
          <line x1="477" y1="455" x2="543" y2="455" stroke-width="6" />
          <line x1="377" y1="450" x2="358" y2="447" stroke-width="5" />
          <line x1="643" y1="450" x2="660" y2="447" stroke-width="5" />

          <!-- Dot eyes (paper · visible on ink face interior) -->
          <circle cx="427" cy="458" r="6.5" fill="#F7F2E6" stroke="none" />
          <circle cx="593" cy="458" r="6.5" fill="#F7F2E6" stroke="none" />

          <!-- Nose hint -->
          <path
            d="M 507,503 Q 503,540 515,548"
            stroke-width="3.5"
            opacity="0.6"
          />

          <!-- Smile -->
          <path d="M 445,575 Q 510,610 575,575" stroke-width="8" />
        </g>

        <!-- ─── Bottom band ─────────────────────────────── -->

        <!-- Subtle horizontal rule (sepia) -->
        <line
          x1="280"
          y1="700"
          x2="744"
          y2="700"
          stroke="#8B6F47"
          stroke-width="1.4"
          opacity="0.7"
        />

        <!-- Channel name (DANTE LABS · larger, brighter accent) -->
        <text
          x="512"
          y="820"
          font-family="'Playfair Display', serif"
          font-size="145"
          font-weight="700"
          fill="#F7F2E6"
          text-anchor="middle"
          dominant-baseline="middle"
          letter-spacing="5"
        >
          <tspan fill="#C9A857" font-weight="800">DANTE</tspan>
          LABS
        </text>
      </svg>
    </div>
  </body>
</html>
