<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>AI단테랩스 · YouTube Banner</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&display=swap"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <link rel="stylesheet" href="../../css/tokens.css" />
    <link rel="stylesheet" href="../../css/typography.css" />

    <style>
      /* ─── DARK MODE token overrides (informal · v2 spec preview) ─── */
      :root {
        --bg-canvas: #1a1a1a;
        --bg-surface: #262626;
        --bg-subtle: #161616;
        --text-primary: #f7f2e6;
        --text-secondary: #c9c4b8;
        --text-muted: #888178;
        --text-link: #5b7f99;
        --text-meta: #c9a857; /* shifted from sepia → amber for visibility */
        --accent-brand: #a0522d; /* rust kept */
        --accent-alt: #5b7f99; /* slate too dark on ink → link */
        --highlight: #ebc65b;
        --border: rgba(247, 242, 230, 0.16);
        --border-strong: rgba(247, 242, 230, 0.32);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 2560px;
        height: 1440px;
        overflow: hidden;
        background: var(--bg-canvas);
      }

      /* Banner canvas: 2560 × 1440 / Mobile safe (centered): 1546 × 423 */
      .banner {
        position: absolute;
        inset: 0;
        width: 2560px;
        height: 1440px;
        overflow: hidden;
        font-family: var(--font-body);
        color: var(--text-primary);
        background: radial-gradient(
          ellipse 60% 50% at 50% 50%,
          var(--bg-canvas) 0%,
          var(--bg-subtle) 100%
        );
      }

      .ledger-top,
      .ledger-bottom {
        position: absolute;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border);
      }
      .ledger-top {
        top: 240px;
      }
      .ledger-bottom {
        bottom: 240px;
      }

      .edge-mark {
        position: absolute;
        font-family: var(--font-sans);
        font-size: 16px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--text-meta);
        opacity: 0.7;
      }
      .edge-mark.left {
        left: 80px;
        top: 80px;
      }
      .edge-mark.right {
        right: 80px;
        top: 80px;
        text-align: right;
      }
      .edge-mark.bl {
        left: 80px;
        bottom: 80px;
      }
      .edge-mark.br {
        right: 80px;
        bottom: 80px;
        text-align: right;
      }

      /* Mobile safe zone (1546 × 423 centered) */
      .safe {
        position: absolute;
        top: 508px;
        left: 507px;
        width: 1546px;
        height: 423px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        gap: 64px;
      }

      /* ─── Left column: text stack ─────────────── */
      .text-col {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding-left: 48px;
      }

      .channel-label {
        font-family: var(--font-sans);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--text-meta);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .channel-label::before {
        content: "";
        width: 36px;
        height: 1px;
        background: var(--color-rust);
      }
      .channel-label .name {
        color: var(--accent-brand);
        letter-spacing: 0.2em;
      }

      .hero {
        font-family: "Nanum Myeongjo", "Noto Serif KR", serif;
        font-size: 110px;
        font-weight: 800;
        line-height: 1.08;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        margin-top: 4px;
      }
      .hero .em {
        color: var(--accent-alt);
      }
      .hero .comma {
        color: var(--text-muted);
      }

      .sub {
        margin-top: 16px;
        font-family: "Noto Serif KR", serif;
        font-size: 34px;
        font-weight: 400;
        line-height: 1.4;
        color: var(--text-secondary);
        letter-spacing: -0.01em;
      }
      .sub .ai {
        color: var(--accent-brand);
        font-weight: 600;
      }

      .meta-line {
        margin-top: 14px;
        font-family: var(--font-sans);
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.2em;
        color: var(--text-meta);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .meta-line::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--color-sepia);
        opacity: 0.45;
        max-width: 240px;
      }

      /* ─── Right column: editorial card ────────── */
      .card-col {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }

      .editorial-card {
        width: 480px;
        height: 360px;
        background: var(--bg-surface);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        padding: 36px 40px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        box-shadow: 0 18px 48px -24px rgba(160, 82, 45, 0.45);
      }
      .editorial-card::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        width: 4px;
        background: var(--accent-brand);
      }

      .card-quote {
        font-family: "Nanum Myeongjo", serif;
        font-size: 30px;
        font-weight: 700;
        line-height: 1.45;
        color: var(--text-primary);
      }
      .card-quote .accent {
        color: var(--accent-brand);
      }
      .card-quote .alt {
        color: var(--accent-alt);
      }
      .card-quote .mark {
        background: var(--highlight);
        padding: 0 6px;
      }

      .card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: var(--font-sans);
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-meta);
        border-top: 1px solid var(--border);
        padding-top: 14px;
      }
      .card-meta .lhs {
        font-weight: 600;
      }
      .card-meta .rhs {
        font-weight: 500;
      }

      .card-tag {
        position: absolute;
        font-family: var(--font-sans);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent-brand);
        background: var(--bg-canvas);
        padding: 4px 10px;
        border: 1px solid var(--accent-brand);
        border-radius: 2px;
      }
      .card-tag.tl {
        top: -10px;
        left: 28px;
      }
      .card-tag.br {
        bottom: -10px;
        right: 28px;
        color: var(--accent-alt);
        border-color: var(--accent-alt);
      }
    </style>
  </head>
  <body>
    <div class="banner" id="banner">
      <div class="ledger-top"></div>
      <div class="ledger-bottom"></div>

      <div class="edge-mark left">DANTE LABS · 2026</div>
      <div class="edge-mark right">SEASON · 02</div>
      <div class="edge-mark bl">VOLUME · I</div>
      <div class="edge-mark br">EST. 2024</div>

      <div class="safe">
        <!-- Left: text column -->
        <div class="text-col">
          <div class="channel-label">
            — Channel · <span class="name">AI 단테랩스</span>
          </div>
          <div class="hero">
            이론은 짧게<span class="comma">,</span><br />
            <span class="em">실전은 깊게</span>
          </div>
          <div class="sub">
            15년차 실무자의 <span class="ai">AI</span> 프로젝트 가이드
          </div>
          <div class="meta-line">AGENTIC · DATA · SCIENCE</div>
        </div>

        <!-- Right: editorial card -->
        <div class="card-col">
          <div class="editorial-card">
            <div class="card-tag tl">EDITORIAL</div>
            <div class="card-quote">
              현업의 언어로 푸는<br />
              <span class="mark">AI</span> <span class="alt">에이전트</span>.
            </div>
            <div class="card-meta">
              <span class="lhs">— DANTE</span>
              <span class="rhs">VOL. 01 · CH. 01</span>
            </div>
            <div class="card-tag br">AGENTIC AI</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
